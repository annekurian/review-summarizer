version: '3.8'

services:
  client:
    depends_on:
      - server
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - 5173:5173
    restart: unless-stopped

  server:
    depends_on:
      - db
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    configs:
      - prisma-config
    ports:
      - 3000:3000
    environment:
      DATABASE_DB: review-sumarizer
      DATABASE_USER: root
      DATABASE_PASSWORD: /run/secrets/db-password
      DATABASE_HOST: localhost
      DATABASE_URL: mysql://db/review-sumarizer
    # command: ./docker-entrypoint.sh
    secrets:
      - db-password
    restart: unless-stopped

  db:
    image: mysql:8
    ports:
      - 3307:3306
    secrets:
      - db-password
    volumes:
      - review-summarizer:/prisma
    environment:
      MYSQL_DATABASE: review-sumarizer
      MYSQL_ROOT_PASSWORD: /run/secrets/db-password
    restart: unless-stopped

configs:
  prisma-config:
    file: packages/server/prisma.config.ts

volumes:
  review-summarizer:

secrets:
  db-password:
    file: packages/server/db-pwd.txt
